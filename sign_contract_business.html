<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签约流程系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }
        .intent-hint {
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            border-radius: 8px;
            font-size: 14px;
            color: #0c4a6e;
        }
        .intent-hint.hidden { display: none; }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e0e0e0;
            z-index: 0;
        }

        .progress-bar {
            position: absolute;
            top: 20px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            z-index: 1;
            transition: width 0.3s ease;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step.active .step-circle {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: scale(1.1);
        }

        .step.completed .step-circle {
            background: #4caf50;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #666;
        }

        .step.active .step-label {
            color: #f5576c;
            font-weight: bold;
        }

        .form-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .response-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }

        .response-container.error {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .response-container.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .response-container h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .response-container p {
            color: #666;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .completed-info {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .completed-info h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 500;
            color: #666;
        }

        .info-value {
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .step-description {
            font-size: 13px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 签约流程系统</h1>
            <p>五步签约流程，请按步骤完成信息填写</p>
        </div>

        <div class="content">
            <!-- 进度条 -->
            <div id="intentHint" class="intent-hint hidden"></div>
            <div class="progress-container">
                <div class="progress-steps">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="step" id="step1">
                        <div class="step-circle">1</div>
                        <div class="step-label">签约对象</div>
                    </div>
                    <div class="step" id="step2">
                        <div class="step-circle">2</div>
                        <div class="step-label">合同编号</div>
                    </div>
                    <div class="step" id="step3">
                        <div class="step-circle">3</div>
                        <div class="step-label">签约类型</div>
                    </div>
                    <div class="step" id="step4">
                        <div class="step-circle">4</div>
                        <div class="step-label">签约日期</div>
                    </div>
                    <div class="step" id="step5">
                        <div class="step-circle">5</div>
                        <div class="step-label">授权确认</div>
                    </div>
                </div>
            </div>

            <!-- 表单容器 -->
            <div class="form-container" id="formContainer">
                <!-- 步骤1：签约对象信息 -->
                <div id="step1Form" class="step-form">
                    <h3>步骤 1：签约对象信息</h3>
                    <p class="step-description">请输入签约对象的姓名和身份证号</p>
                    <div class="form-row">
                        <div class="form-group">
                            <label>姓名 *</label>
                            <input type="text" id="name" placeholder="请输入姓名">
                        </div>
                        <div class="form-group">
                            <label>身份证号 *</label>
                            <input type="text" id="idCard" placeholder="请输入18位身份证号" maxlength="18">
                        </div>
                    </div>
                </div>

                <!-- 步骤2：合同编号 -->
                <div id="step2Form" class="step-form hidden">
                    <h3>步骤 2：合同编号</h3>
                    <p class="step-description">请输入合同编号（格式：QY+8位数字，如 QY20240121）</p>
                    <div class="form-group">
                        <label>合同编号 *</label>
                        <input type="text" id="contractNo" placeholder="QY20240121" pattern="QY\d{8}">
                    </div>
                </div>

                <!-- 步骤3：签约类型 -->
                <div id="step3Form" class="step-form hidden">
                    <h3>步骤 3：签约类型</h3>
                    <p class="step-description">请选择签约类型</p>
                    <div class="form-group">
                        <label>签约类型 *</label>
                        <select id="contractType">
                            <option value="">请选择</option>
                            <option value="个人">个人</option>
                            <option value="企业">企业</option>
                        </select>
                    </div>
                </div>

                <!-- 步骤4：签约日期 -->
                <div id="step4Form" class="step-form hidden">
                    <h3>步骤 4：签约日期</h3>
                    <p class="step-description">请输入签约日期（格式：YYYY-MM-DD）</p>
                    <div class="form-group">
                        <label>签约日期 *</label>
                        <input type="date" id="signDate">
                    </div>
                </div>

                <!-- 步骤5：授权确认 -->
                <div id="step5Form" class="step-form hidden">
                    <h3>步骤 5：授权确认</h3>
                    <p class="step-description">请确认是否授权签约</p>
                    <div class="form-group">
                        <label>授权确认 *</label>
                        <select id="authorization">
                            <option value="">请选择</option>
                            <option value="是">是</option>
                            <option value="否">否</option>
                        </select>
                    </div>
                </div>

                <button class="btn" id="submitBtn" onclick="submitForm()">
                    <span id="submitText">提交</span>
                </button>
                <button class="btn btn-secondary" onclick="resetForm()">重新开始</button>
            </div>

            <!-- 响应容器 -->
            <div id="responseContainer" class="response-container hidden">
                <h4 id="responseTitle"></h4>
                <p id="responseText"></p>
            </div>

            <!-- 已完成信息汇总 -->
            <div id="completedInfo" class="completed-info hidden">
                <h3>✅ 签约信息汇总</h3>
                <div id="infoList"></div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let currentStep = 1;
        let isComplete = false;

        // 初始化
        function init() {
            updateProgress(1);
            showStepForm(1);
            // 从意图识别页跳转时带 ?q= 显示来源
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            const hintEl = document.getElementById('intentHint');
            if (q && hintEl) {
                hintEl.textContent = '来自意图识别：' + decodeURIComponent(q);
                hintEl.classList.remove('hidden');
            }
        }

        // 更新进度条
        function updateProgress(step) {
            currentStep = step;
            const progress = ((step - 1) / 4) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            // 更新步骤状态
            for (let i = 1; i <= 5; i++) {
                const stepEl = document.getElementById(`step${i}`);
                stepEl.classList.remove('active', 'completed');
                if (i < step) {
                    stepEl.classList.add('completed');
                } else if (i === step) {
                    stepEl.classList.add('active');
                }
            }
        }

        // 显示对应步骤的表单
        function showStepForm(step) {
            // 隐藏所有表单
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`step${i}Form`).classList.add('hidden');
            }
            // 显示当前步骤表单
            if (step > 0 && step <= 5) {
                document.getElementById(`step${step}Form`).classList.remove('hidden');
            }
        }

        // 提交表单
        async function submitForm() {
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            
            // 禁用按钮并显示加载状态
            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="loading"></span>提交中...';

            try {
                let userInput = '';
                
                // 根据当前步骤构建输入
                if (currentStep === 1) {
                    const name = document.getElementById('name').value.trim();
                    const idCard = document.getElementById('idCard').value.trim();
                    userInput = `姓名=${name} 身份证号=${idCard}`;
                } else if (currentStep === 2) {
                    const contractNo = document.getElementById('contractNo').value.trim();
                    userInput = `合同编号=${contractNo}`;
                } else if (currentStep === 3) {
                    const contractType = document.getElementById('contractType').value;
                    userInput = `签约类型=${contractType}`;
                } else if (currentStep === 4) {
                    const signDate = document.getElementById('signDate').value;
                    userInput = `签约日期=${signDate}`;
                } else if (currentStep === 5) {
                    const authorization = document.getElementById('authorization').value;
                    userInput = `授权=${authorization}`;
                }

                // 调用 API
                const response = await fetch('/api/sign-contract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_input: userInput,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                
                // 更新会话 ID
                if (!sessionId) {
                    sessionId = data.session_id;
                }

                // 更新状态
                currentStep = data.current_step;
                isComplete = data.is_complete;

                // 显示响应
                showResponse(data.response, data.error_msg, data.is_complete);

                // 更新进度
                if (data.current_step > 0 && !data.is_complete) {
                    updateProgress(data.current_step);
                    showStepForm(data.current_step);
                }

                // 如果完成，显示汇总信息
                if (data.is_complete) {
                    showCompletedInfo(data.step_info);
                }

            } catch (error) {
                showResponse('请求失败：' + error.message, '', false, true);
            } finally {
                // 恢复按钮
                submitBtn.disabled = false;
                submitText.textContent = '提交';
            }
        }

        // 显示响应
        function showResponse(response, errorMsg, success, isError = false) {
            const container = document.getElementById('responseContainer');
            const title = document.getElementById('responseTitle');
            const text = document.getElementById('responseText');

            container.classList.remove('hidden', 'error', 'success');
            
            if (isError || errorMsg) {
                container.classList.add('error');
                title.textContent = '❌ 错误';
            } else if (success) {
                container.classList.add('success');
                title.textContent = '✅ 成功';
            } else {
                title.textContent = 'ℹ️ 提示';
            }

            text.textContent = response;
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 显示已完成信息
        function showCompletedInfo(stepInfo) {
            const container = document.getElementById('completedInfo');
            const list = document.getElementById('infoList');
            
            list.innerHTML = '';
            
            if (stepInfo.step1) {
                addInfoItem('签约对象', `${stepInfo.step1.name}（${stepInfo.step1.id_card}）`);
            }
            if (stepInfo.step2) {
                addInfoItem('合同编号', stepInfo.step2.contract_no);
            }
            if (stepInfo.step3) {
                addInfoItem('签约类型', stepInfo.step3.contract_type);
            }
            if (stepInfo.step4) {
                addInfoItem('签约日期', stepInfo.step4.sign_date);
            }
            if (stepInfo.step5) {
                addInfoItem('授权状态', stepInfo.step5.authorization);
            }

            container.classList.remove('hidden');
        }

        // 添加信息项
        function addInfoItem(label, value) {
            const item = document.createElement('div');
            item.className = 'info-item';
            item.innerHTML = `
                <span class="info-label">${label}：</span>
                <span class="info-value">${value}</span>
            `;
            document.getElementById('infoList').appendChild(item);
        }

        // 重置表单
        async function resetForm() {
            if (sessionId) {
                try {
                    await fetch(`/api/sign-contract/${sessionId}`, {
                        method: 'DELETE'
                    });
                } catch (error) {
                    console.error('清除会话失败:', error);
                }
            }

            sessionId = null;
            currentStep = 1;
            isComplete = false;

            // 重置表单
            document.getElementById('name').value = '';
            document.getElementById('idCard').value = '';
            document.getElementById('contractNo').value = '';
            document.getElementById('contractType').value = '';
            document.getElementById('signDate').value = '';
            document.getElementById('authorization').value = '';

            // 隐藏响应和汇总
            document.getElementById('responseContainer').classList.add('hidden');
            document.getElementById('completedInfo').classList.add('hidden');

            // 重置进度
            init();
        }

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
